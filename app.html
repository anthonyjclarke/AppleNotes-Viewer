<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes</title>
  <style>
    /* ── Variables ────────────────────────────────────────────────── */
    :root {
      --sidebar-w: 220px;
      --list-w:    310px;
      --radius:    10px;
      --trans:     0.15s ease;

      /* Light palette */
      --bg-app:       #F2EFE7;
      --bg-sidebar:   #EAE7DF;
      --bg-list:      #F7F5EE;
      --bg-content:   #FFFFFF;
      --bg-hover:     rgba(0,0,0,0.045);
      --bg-sel:       rgba(255,204,0,0.22);
      --bg-search:    rgba(0,0,0,0.07);
      --bg-group:     #F7F5EE;
      --bg-img:       #EDEBE3;

      --tx-primary:   #1C1C1E;
      --tx-secondary: #636366;
      --tx-tertiary:  #AEAEB2;
      --tx-group:     #8E8E93;

      --border:       rgba(0,0,0,0.09);
      --divider:      rgba(0,0,0,0.06);
      --accent:       #FFCC00;
      --mark-bg:      #FFED4A;
      --mark-tx:      #1C1C1E;

      --toggle-off:   #C7C7CC;
      --shadow:       0 1px 8px rgba(0,0,0,0.10);
    }

    [data-theme="dark"] {
      --bg-app:       #1C1C1E;
      --bg-sidebar:   #252527;
      --bg-list:      #2C2C2E;
      --bg-content:   #3A3A3C;
      --bg-hover:     rgba(255,255,255,0.055);
      --bg-sel:       rgba(255,204,0,0.13);
      --bg-search:    rgba(255,255,255,0.08);
      --bg-group:     #2C2C2E;
      --bg-img:       #48484A;

      --tx-primary:   #F2F2F7;
      --tx-secondary: #AEAEB2;
      --tx-tertiary:  #636366;
      --tx-group:     #636366;

      --border:       rgba(255,255,255,0.08);
      --divider:      rgba(255,255,255,0.05);
      --mark-bg:      #4A3A00;
      --mark-tx:      #FFD60A;

      --toggle-off:   #48484A;
      --shadow:       0 1px 8px rgba(0,0,0,0.4);
    }

    /* ── Reset ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
      background: var(--bg-app);
      color: var(--tx-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── App shell ────────────────────────────────────────────────── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 18px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--tx-primary);
    }

    /* Dark/light toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-emoji { font-size: 13px; }
    .toggle-track {
      width: 36px; height: 21px;
      background: var(--toggle-off);
      border-radius: 11px;
      position: relative;
      transition: background var(--trans);
    }
    .toggle-track.on { background: #34C759; }
    .toggle-thumb {
      position: absolute;
      width: 17px; height: 17px;
      background: #fff;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: transform var(--trans);
      box-shadow: 0 1px 4px rgba(0,0,0,0.30);
    }
    .toggle-track.on .toggle-thumb { transform: translateX(15px); }

    /* Folder list */
    .folder-list {
      flex: 1;
      overflow-y: auto;
      padding: 2px 0 12px;
    }

    .folder-section-label {
      padding: 10px 16px 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--tx-tertiary);
    }

    .folder-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px 7px 14px;
      border-radius: 8px;
      margin: 1px 6px;
      cursor: pointer;
      transition: background var(--trans);
    }
    .folder-item:hover { background: var(--bg-hover); }
    .folder-item.active { background: var(--bg-sel); }

    .folder-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .folder-name { font-size: 14px; font-weight: 500; flex: 1; min-width: 0;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .folder-badge {
      font-size: 12px; color: var(--tx-tertiary);
      background: var(--bg-hover); padding: 1px 6px;
      border-radius: 8px; flex-shrink: 0;
    }

    /* Separator between folders and tags */
    .sidebar-divider {
      height: 1px;
      background: var(--divider);
      margin: 6px 14px;
    }

    /* ── Tag pill grid ────────────────────────────────────────────── */
    .tag-grid {
      padding: 4px 10px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag-pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--bg-content);
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 500;
      color: var(--tx-secondary);
      cursor: pointer;
      transition: background var(--trans), border-color var(--trans), color var(--trans);
      user-select: none;
      white-space: nowrap;
      line-height: 1.3;
    }
    .tag-pill:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--tx-primary);
    }
    .tag-pill.active {
      background: var(--bg-sel);
      border-color: var(--accent);
      color: var(--tx-primary);
      font-weight: 600;
    }
    [data-theme="dark"] .tag-pill { background: var(--bg-list); }
    [data-theme="dark"] .tag-pill:hover { background: var(--bg-hover); }

    /* ── Startup loading overlay ──────────────────────────────────── */
    .startup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      align-items: center;
      justify-content: center;
      background: var(--bg-app);
    }
    .startup-overlay.open { display: flex; }
    .startup-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 40px 48px;
      background: var(--bg-content);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 280px;
    }
    .startup-icon { font-size: 36px; line-height: 1; }
    .startup-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--tx-primary);
    }
    .startup-bar-track {
      width: 100%;
      height: 5px;
      background: var(--bg-search);
      border-radius: 3px;
      overflow: hidden;
    }
    .startup-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width 0.25s ease;
    }
    .startup-label {
      font-size: 13px;
      color: var(--tx-secondary);
    }

    /* ── Note List Panel ──────────────────────────────────────────── */
    .list-panel {
      width: var(--list-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-list);
      overflow: hidden;
    }

    /* ── Resize handle between list and content ───────────────────── */
    .resize-handle {
      width: 5px;
      flex-shrink: 0;
      cursor: col-resize;
      background: var(--border);
      position: relative;
      z-index: 10;
      transition: background 0.1s;
    }
    .resize-handle::after {
      content: "";
      position: absolute;
      inset: 0 -4px;  /* wider invisible hit-area */
    }
    .resize-handle:hover,
    .resize-handle.dragging { background: var(--accent); }

    .list-top {
      padding: 10px 11px 6px;
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }

    .search-wrap {
      position: relative;
    }
    .search-ico {
      position: absolute;
      left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--tx-tertiary);
      font-size: 13px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 7px 28px 7px 28px;
      border-radius: 9px;
      border: none;
      outline: none;
      background: var(--bg-search);
      color: var(--tx-primary);
      font-size: 14px;
      font-family: inherit;
      transition: background var(--trans);
    }
    .search-input::placeholder { color: var(--tx-tertiary); }
    .search-x {
      position: absolute;
      right: 7px; top: 50%;
      transform: translateY(-50%);
      width: 17px; height: 17px;
      background: var(--tx-tertiary);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--bg-list);
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
    }
    .search-input:not(:placeholder-shown) + .search-x { display: flex; }

    /* Search-all pill */
    .search-all-row {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 5px 2px 0;
    }
    .search-all-row.visible { display: flex; }
    .search-all-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px 3px 6px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--tx-tertiary);
      font-family: inherit;
      transition: all var(--trans);
      user-select: none;
      white-space: nowrap;
    }
    .search-all-pill:hover { border-color: var(--accent); color: var(--tx-secondary); }
    .search-all-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #1C1C1E;
    }
    .search-all-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
      flex-shrink: 0;
      transition: opacity var(--trans);
    }
    .search-all-pill.active .search-all-dot { opacity: 1; }

    .list-meta {
      padding: 5px 13px 2px;
      font-size: 11px;
      color: var(--tx-tertiary);
      font-weight: 500;
      flex-shrink: 0;
    }

    .note-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .note-list::-webkit-scrollbar { width: 5px; }
    .note-list::-webkit-scrollbar-track { background: transparent; }
    .note-list::-webkit-scrollbar-thumb { background: var(--tx-tertiary); border-radius: 3px; opacity: 0.4; }

    /* Group header */
    .group-hdr {
      padding: 14px 13px 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--tx-group);
      background: var(--bg-group);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    /* Note item */
    .note-item {
      padding: 9px 13px 9px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--divider);
      transition: background 0.1s;
      position: relative;
      user-select: none;
    }
    .note-item:hover { background: var(--bg-hover); }
    .note-item.active { background: var(--bg-sel); }
    .note-item.active::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .note-row1 {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 3px;
    }
    .note-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--tx-primary);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-date-badge {
      font-size: 11.5px;
      color: var(--tx-tertiary);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .note-snippet {
      font-size: 12.5px;
      color: var(--tx-secondary);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.45;
    }

    /* ── Content Panel ────────────────────────────────────────────── */
    .content-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-content);
      overflow: hidden;
    }

    .content-bar {
      text-align: center;
      padding: 14px 40px 12px;
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }
    .content-date-lbl {
      font-size: 12px;
      color: var(--tx-tertiary);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px 52px 60px;
    }
    .content-scroll::-webkit-scrollbar { width: 7px; }
    .content-scroll::-webkit-scrollbar-track { background: transparent; }
    .content-scroll::-webkit-scrollbar-thumb { background: var(--tx-tertiary); border-radius: 4px; }

    /* Note body typography */
    .note-body {
      max-width: 740px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.68;
      color: var(--tx-primary);
      word-break: break-word;
    }
    .note-body h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--tx-primary);
      margin-bottom: 2px;
      line-height: 1.25;
    }
    .note-body br { display: block; }
    .note-body img {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      margin: 10px 0;
      background: var(--bg-img);
      cursor: zoom-in;
      transition: opacity 0.1s, transform 0.1s;
    }
    .note-body img:hover { opacity: 0.93; transform: scale(0.995); }
    .note-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
      font-size: 14px;
      border-radius: 8px;
      overflow: hidden;
    }
    .note-body td, .note-body th {
      border: 1px solid var(--border);
      padding: 8px 13px;
      color: var(--tx-primary);
      text-align: left;
    }
    .note-body th { background: var(--bg-search); font-weight: 600; }
    .note-body tr:nth-child(even) td { background: rgba(0,0,0,0.025); }
    [data-theme="dark"] .note-body tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
    .note-body ul, .note-body ol { padding-left: 22px; margin: 6px 0; }
    .note-body li { margin: 3px 0; }
    .note-body a { color: var(--accent); text-decoration: none; }
    .note-body a:hover { text-decoration: underline; }
    .note-body embed, .note-body object {
      display: block;
      width: 100%;
      height: 600px;
      border: none;
      border-radius: var(--radius);
      margin: 8px 0;
    }

    /* ── Placeholder / empty states ───────────────────────────────── */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--tx-tertiary);
      text-align: center;
      padding: 40px;
    }
    .placeholder-icon { font-size: 56px; opacity: 0.3; }
    .placeholder-title { font-size: 17px; font-weight: 600; color: var(--tx-secondary); }
    .placeholder-sub   { font-size: 14px; }

    /* ── Loading ──────────────────────────────────────────────────── */
    .loading-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; height: 100%;
      font-size: 14px; color: var(--tx-tertiary);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    /* ── Search highlight ─────────────────────────────────────────── */
    mark {
      background: var(--mark-bg);
      color: var(--mark-tx);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── Lightbox ─────────────────────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 12px 60px rgba(0,0,0,0.6);
    }

    /* ── Sync footer ──────────────────────────────────────────────── */
    .sync-footer {
      flex-shrink: 0;
      padding: 8px 14px 12px;
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sync-status {
      flex: 1;
      font-size: 11px;
      color: var(--tx-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sync-btn {
      flex-shrink: 0;
      padding: 4px 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--tx-secondary);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color var(--trans), color var(--trans);
    }
    .sync-btn:hover  { border-color: var(--accent); color: var(--tx-primary); }
    .sync-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Settings gear button ─────────────────────────────────────── */
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      opacity: 0.5;
      padding: 2px 4px;
      border-radius: 5px;
      transition: opacity var(--trans);
      line-height: 1;
    }
    .settings-btn:hover { opacity: 1; }

    /* ── PDF preview modal ────────────────────────────────────────── */
    .pdf-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 3000;
      flex-direction: column;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .pdf-modal.open { display: flex; }
    .pdf-modal-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      background: rgba(28,28,30,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .pdf-modal-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: #F2F2F7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pdf-modal-tab {
      font-size: 12px;
      color: #FFCC00;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pdf-modal-tab:hover { text-decoration: underline; }
    .pdf-modal-close {
      background: none;
      border: none;
      color: #AEAEB2;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
      padding: 0 2px;
    }
    .pdf-modal-close:hover { color: #F2F2F7; }
    .pdf-modal-embed {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>

<!-- ── Startup indexing overlay ──────────────────────────────────────── -->
<div class="startup-overlay" id="startupOverlay">
  <div class="startup-card">
    <div class="startup-icon">📋</div>
    <div class="startup-title">Loading Notes</div>
    <div class="startup-bar-track">
      <div class="startup-bar-fill" id="startupFill"></div>
    </div>
    <div class="startup-label" id="startupLabel">Starting…</div>
  </div>
</div>

<div class="app">

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <span class="sidebar-title">Notes</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
        <div class="toggle-wrap" id="themeToggleWrap" title="Toggle dark mode">
          <span class="toggle-emoji" id="themeEmoji">☀️</span>
          <div class="toggle-track" id="themeTrack">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="folder-list" id="folderList">
      <!-- Populated by JS -->
    </div>

    <div class="sync-footer">
      <span class="sync-status" id="syncStatus">—</span>
      <button class="sync-btn" id="syncBtn" title="Sync notes now">↻ Sync</button>
    </div>
  </aside>

  <!-- ── Sidebar ↔ List resize handle ─────────────────────────── -->
  <div class="resize-handle" id="sidebarResizeHandle"></div>

  <!-- ── Note List ───────────────────────────────────────────────── -->
  <div class="list-panel">
    <div class="list-top">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input id="searchInput" class="search-input" type="search" placeholder="Search" autocomplete="off" spellcheck="false">
        <div class="search-x" id="searchClear">✕</div>
      </div>
      <div class="search-all-row" id="searchAllRow">
        <button class="search-all-pill" id="searchAllPill" title="Search across all folders">
          <span class="search-all-dot"></span>Search all notes
        </button>
      </div>
    </div>
    <div class="list-meta" id="listMeta"></div>
    <div class="note-list" id="noteList">
      <div class="loading-wrap"><div class="spinner"></div>Loading…</div>
    </div>
  </div>

  <!-- ── Resize handle ─────────────────────────────────────────── -->
  <div class="resize-handle" id="listResizeHandle"></div>

  <!-- ── Content ─────────────────────────────────────────────────── -->
  <div class="content-panel" id="contentPanel">
    <div class="placeholder">
      <div class="placeholder-icon">📝</div>
      <div class="placeholder-title">Select a note</div>
      <div class="placeholder-sub">Choose from the list to read it here</div>
    </div>
  </div>

</div><!-- .app -->

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<!-- PDF preview modal -->
<div class="pdf-modal" id="pdfModal">
  <div class="pdf-modal-bar">
    <span class="pdf-modal-name" id="pdfModalName"></span>
    <a  class="pdf-modal-tab" id="pdfModalTab" href="" target="_blank" rel="noopener">Open in new tab ↗</a>
    <button class="pdf-modal-close" id="pdfModalClose" title="Close">×</button>
  </div>
  <embed class="pdf-modal-embed" id="pdfModalEmbed" src="" type="application/pdf">
</div>

<script>
/* ── State ─────────────────────────────────────────────────────────── */
let allNotes      = [];
let shownNotes    = [];
let selectedFile  = null;
let currentFolder = "__all__";
let searchTimer   = null;
let searchQ       = "";
let searchAll     = false;
let currentTag    = null;   // active tag filter, e.g. "#GPS"

/* ── Theme ──────────────────────────────────────────────────────────── */
const html      = document.documentElement;
const themeTrack = document.getElementById("themeTrack");
const themeEmoji = document.getElementById("themeEmoji");

function setTheme(dark) {
  html.setAttribute("data-theme", dark ? "dark" : "light");
  themeTrack.classList.toggle("on", dark);
  themeEmoji.textContent = dark ? "🌙" : "☀️";
  localStorage.setItem("notes-theme", dark ? "dark" : "light");
}

function isDark() { return html.getAttribute("data-theme") === "dark"; }

// Init theme
(function initTheme() {
  const saved = localStorage.getItem("notes-theme");
  if (saved) { setTheme(saved === "dark"); }
  else { setTheme(window.matchMedia("(prefers-color-scheme: dark)").matches); }
})();

document.getElementById("themeToggleWrap").addEventListener("click", () => setTheme(!isDark()));

/* ── Date utilities ─────────────────────────────────────────────────── */
function localDate(dateStr) {
  // Parse YYYY-MM-DD as local date (avoid UTC-offset issues)
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function fmtShort(dateStr) {
  if (!dateStr || dateStr === "1900-01-01") return "";
  const d   = localDate(dateStr);
  const now  = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff  = Math.floor((today - d) / 86400000);
  if (diff === 0) return "Today";
  if (diff === 1) return "Yesterday";
  if (diff < 7)   return d.toLocaleDateString("en-AU", { weekday: "short" });
  if (d.getFullYear() === now.getFullYear())
    return d.toLocaleDateString("en-AU", { day: "numeric", month: "short" });
  return d.toLocaleDateString("en-AU", { day: "numeric", month: "short", year: "numeric" });
}

function fmtFull(dateStr) {
  if (!dateStr || dateStr === "1900-01-01") return "";
  return localDate(dateStr).toLocaleDateString("en-AU", {
    weekday: "long", day: "numeric", month: "long", year: "numeric"
  });
}

function groupLabel(dateStr) {
  if (!dateStr || dateStr === "1900-01-01") return "Undated";
  const d    = localDate(dateStr);
  const now  = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff  = Math.floor((today - d) / 86400000);
  if (diff === 0)  return "Today";
  if (diff === 1)  return "Yesterday";
  if (diff <= 7)   return "Previous 7 Days";
  if (diff <= 30)  return "Previous 30 Days";
  return String(d.getFullYear());
}

/* ── HTML escaping + highlight ──────────────────────────────────────── */
function esc(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function highlight(text, q) {
  if (!q || !text) return esc(text);
  const qEsc = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const parts = text.split(new RegExp(`(${qEsc})`, "gi"));
  return parts.map((p, i) => i % 2 ? `<mark>${esc(p)}</mark>` : esc(p)).join("");
}

/* ── Render folders ─────────────────────────────────────────────────── */
async function loadFolders() {
  const resp = await fetch("/api/folders");
  const data = await resp.json();   // {total, groups:[{label, folders:[{name,path,count,deleted}]}]}

  let html = `<div class="folder-item ${currentFolder === "__all__" && !currentTag ? "active" : ""}" data-folder="__all__">
    <span class="folder-icon">📋</span>
    <span class="folder-name">All Notes</span>
    <span class="folder-badge">${data.total}</span>
  </div>`;

  for (const group of data.groups) {
    html += `<div class="folder-section-label">${esc(group.label)}</div>`;
    for (const f of group.folders) {
      const icon   = f.deleted ? '🗑️' : '📁';
      const active = currentFolder === f.path && !currentTag ? " active" : "";
      html += `<div class="folder-item${active}" data-folder="${esc(f.path)}">
        <span class="folder-icon">${icon}</span>
        <span class="folder-name">${esc(f.name)}</span>
        <span class="folder-badge">${f.count}</span>
      </div>`;
    }
  }

  document.getElementById("folderList").innerHTML = html;

  document.querySelectorAll(".folder-item").forEach(el => {
    el.addEventListener("click", () => {
      currentFolder = el.dataset.folder;
      currentTag    = null;
      searchQ       = "";
      searchAll     = false;
      document.getElementById("searchInput").value = "";
      document.querySelectorAll(".folder-item").forEach(e => e.classList.remove("active"));
      document.querySelectorAll(".tag-pill").forEach(e =>
        e.classList.toggle("active", e.dataset.tag === "")  // keep "All Tags" active
      );
      el.classList.add("active");
      updateSearchAllPill();
      loadNoteList();
    });
  });
}

/* ── Tags sidebar ────────────────────────────────────────────────────── */
async function loadTags() {
  const resp = await fetch("/api/tags");
  const tags = await resp.json();
  if (!tags.length) return;

  const container = document.getElementById("folderList");

  const allActive = !currentTag ? " active" : "";
  let html = `<div class="sidebar-divider"></div>
    <div class="folder-section-label">Tags</div>
    <div class="tag-grid" id="tagGrid">
      <div class="tag-pill${allActive}" data-tag="">All Tags</div>`;

  for (const { tag } of tags) {
    const active = currentTag === tag ? " active" : "";
    html += `<div class="tag-pill${active}" data-tag="${esc(tag)}">${esc(tag)}</div>`;
  }
  html += `</div>`;

  container.insertAdjacentHTML("beforeend", html);

  container.querySelectorAll(".tag-pill").forEach(pill => {
    pill.addEventListener("click", () => {
      const tag = pill.dataset.tag;
      if (tag) {
        currentTag = tag;
        searchQ    = tag;
        searchAll  = false;
        document.getElementById("searchInput").value = tag;
      } else {
        // "All Tags" — clear tag filter, keep current folder
        currentTag = null;
        searchQ    = "";
        searchAll  = false;
        document.getElementById("searchInput").value = "";
      }
      document.querySelectorAll(".folder-item").forEach(e => e.classList.remove("active"));
      document.querySelectorAll(".tag-pill").forEach(e => e.classList.remove("active"));
      pill.classList.add("active");
      // Restore folder highlight if "All Tags" was clicked
      if (!tag) {
        document.querySelectorAll(".folder-item").forEach(e =>
          e.classList.toggle("active", e.dataset.folder === currentFolder)
        );
      }
      updateSearchAllPill();
      loadNoteList();
    });
  });
}

/* ── Search-all pill ────────────────────────────────────────────────── */
function updateSearchAllPill() {
  const row  = document.getElementById("searchAllRow");
  const pill = document.getElementById("searchAllPill");
  // Hide the pill entirely when in tag mode (tag search is always global)
  // Show only when a specific folder is selected and no tag is active
  const folderScoped = currentFolder !== "__all__" && !currentTag;
  row.classList.toggle("visible", folderScoped);
  pill.classList.toggle("active", searchAll);
}

document.getElementById("searchAllPill").addEventListener("click", () => {
  searchAll = !searchAll;
  updateSearchAllPill();
  loadNoteList();
});

/* ── Load & render note list ────────────────────────────────────────── */
async function loadNoteList() {
  document.getElementById("noteList").innerHTML =
    `<div class="loading-wrap"><div class="spinner"></div>Loading…</div>`;

  // Tag mode: always search all folders
  // searchAll toggle: expand a folder search to all folders
  const folder = (currentTag || searchAll) && searchQ.length >= 2
    ? "__all__"
    : currentFolder;

  const url = searchQ.length >= 2
    ? `/api/search?q=${encodeURIComponent(searchQ)}&folder=${encodeURIComponent(folder)}`
    : `/api/notes?folder=${encodeURIComponent(currentFolder)}`;

  const resp = await fetch(url);
  allNotes   = await resp.json();
  shownNotes = allNotes;
  renderList();
}

function renderList() {
  const listEl = document.getElementById("noteList");
  const metaEl = document.getElementById("listMeta");
  const q      = searchQ.length >= 2 ? searchQ : "";

  if (shownNotes.length === 0) {
    listEl.innerHTML = `
      <div class="placeholder" style="height:auto;padding:60px 20px;">
        <div class="placeholder-icon">🔍</div>
        <div class="placeholder-title">No Results</div>
        <div class="placeholder-sub">Nothing matched "${esc(q)}"</div>
      </div>`;
    metaEl.textContent = "No results";
    return;
  }

  metaEl.textContent = q
    ? `${shownNotes.length} result${shownNotes.length !== 1 ? "s" : ""}`
    : `${shownNotes.length} note${shownNotes.length !== 1 ? "s" : ""}`;

  let out = "";
  let lastGroup = null;

  for (const note of shownNotes) {
    const grp = groupLabel(note.date);
    if (grp !== lastGroup) {
      out += `<div class="group-hdr">${esc(grp)}</div>`;
      lastGroup = grp;
    }
    const active = note.file === selectedFile ? " active" : "";
    out += `
      <div class="note-item${active}" data-file="${esc(note.file)}">
        <div class="note-row1">
          <div class="note-title">${highlight(note.title, q)}</div>
          <div class="note-date-badge">${esc(fmtShort(note.date))}</div>
        </div>
        <div class="note-snippet">${highlight(note.snippet, q)}</div>
      </div>`;
  }

  listEl.innerHTML = out;
  listEl.querySelectorAll(".note-item").forEach(el =>
    el.addEventListener("click", () => openNote(el.dataset.file))
  );

  // Scroll selected item into view
  const active = listEl.querySelector(".note-item.active");
  if (active) active.scrollIntoView({ block: "nearest" });
}

/* ── Open & render a note ───────────────────────────────────────────── */
async function openNote(file) {
  if (selectedFile === file) return;
  selectedFile = file;

  // Highlight in list
  document.querySelectorAll(".note-item").forEach(el =>
    el.classList.toggle("active", el.dataset.file === file)
  );

  const panel = document.getElementById("contentPanel");
  panel.innerHTML = `<div class="loading-wrap"><div class="spinner"></div>Loading…</div>`;

  try {
    const resp = await fetch(`/api/note?file=${encodeURIComponent(file)}`);
    const rawHtml = await resp.text();
    renderNote(rawHtml, file);
  } catch {
    panel.innerHTML = `
      <div class="placeholder">
        <div class="placeholder-icon">⚠️</div>
        <div class="placeholder-title">Could not load note</div>
      </div>`;
  }
}

function renderNote(rawHtml, file) {
  const doc  = new DOMParser().parseFromString(rawHtml, "text/html");
  const body = doc.body;

  // Determine folder path for static URL rewriting
  const note = allNotes.find(n => n.file === file) || shownNotes.find(n => n.file === file) || {};

  // Per-segment encoding preserves "/" separators while safely encoding special
  // characters in folder/file names — including "#" (→ %23) which would otherwise
  // be treated as a URL fragment delimiter by the browser and truncate the request.
  const encRelPath = rel => rel.split("/").map(encodeURIComponent).join("/");
  const folderPath = encRelPath(note.folder || "");

  // Rewrite relative image src paths (base64 data: URIs are skipped by the regex)
  body.querySelectorAll("img[src]").forEach(img => {
    const src = img.getAttribute("src") || "";
    if (src && !src.match(/^(https?:|data:|#|\/)/)) {
      img.setAttribute("src", `/static/${folderPath}/${encRelPath(src)}`);
    }
    img.removeAttribute("style"); // let our CSS control sizing
  });

  // Rewrite relative attachment hrefs — handles apple-notes-exporter format:
  //   "2026-04-15 My Note (Attachments)/Document.pdf"
  //   "2026-04-15 My Note #tag (Attachments)/Pasted Graphic.png"
  body.querySelectorAll("a[href]").forEach(a => {
    const href = a.getAttribute("href") || "";
    if (href && !href.match(/^(https?:|data:|#|\/)/)) {
      const rewritten = `/static/${folderPath}/${encRelPath(href)}`;
      a.setAttribute("href", rewritten);
      if (href.toLowerCase().endsWith(".pdf")) {
        // Mark <a> for the delegated PDF modal listener.
        a.setAttribute("data-pdf-href", rewritten);
        a.removeAttribute("target");   // prevent new-tab navigation
        // apple-notes-exporter wraps the <a> in: flex-card > flex-1-div > <a>.
        // Clicks on the emoji icon or "Scan File" text are siblings of <a>,
        // not ancestors — so also mark the outer card div so the delegated
        // closest("[data-pdf-href]") catches those clicks too.
        const card = a.parentElement?.parentElement;
        if (card && card !== body && card.style?.display === "flex") {
          card.setAttribute("data-pdf-href", rewritten);
          card.style.cursor = "pointer";
        }
      } else {
        a.setAttribute("target", "_blank");
        a.setAttribute("rel", "noopener");
      }
    }
  });

  // Same for <embed src> and <object data> (inline PDFs and media)
  body.querySelectorAll("embed[src], object[data]").forEach(el => {
    const attr = el.tagName === "OBJECT" ? "data" : "src";
    const val  = el.getAttribute(attr) || "";
    if (val && !val.match(/^(https?:|data:|#|\/)/)) {
      el.setAttribute(attr, `/static/${folderPath}/${encRelPath(val)}`);
    }
  });

  const fullDate = fmtFull(note.date || "");
  const panel    = document.getElementById("contentPanel");

  panel.innerHTML = `
    <div class="content-bar">
      <div class="content-date-lbl">${esc(fullDate)}</div>
    </div>
    <div class="content-scroll">
      <div class="note-body" id="noteBody"></div>
    </div>`;

  document.getElementById("noteBody").innerHTML = body.innerHTML;

  // Lightbox for images
  document.querySelectorAll(".note-body img").forEach(img => {
    img.addEventListener("click", () => {
      document.getElementById("lightboxImg").src = img.src;
      document.getElementById("lightbox").classList.add("open");
    });
  });

  // PDF links are intercepted via the delegated listener on contentPanel (see below),
  // which handles any click target inside the <a> and survives note reloads.
}

/* ── Lightbox ───────────────────────────────────────────────────────── */
document.getElementById("lightbox").addEventListener("click", () =>
  document.getElementById("lightbox").classList.remove("open")
);

/* ── PDF modal ──────────────────────────────────────────────────────── */
document.getElementById("pdfModalClose").addEventListener("click", () => {
  document.getElementById("pdfModal").classList.remove("open");
  document.getElementById("pdfModalEmbed").src = "";   // stop loading
});
document.getElementById("pdfModal").addEventListener("click", e => {
  if (e.target === document.getElementById("pdfModal")) {
    document.getElementById("pdfModal").classList.remove("open");
    document.getElementById("pdfModalEmbed").src = "";
  }
});
// PDF link interception — single delegated listener on the persistent contentPanel.
// Handles clicks anywhere inside an attachment <a> (icon, text, card border, etc.)
// without needing re-attachment on each note load.
document.getElementById("contentPanel").addEventListener("click", e => {
  const a = e.target.closest("[data-pdf-href]");
  if (!a) return;
  e.preventDefault();
  const href = a.getAttribute("data-pdf-href");
  const name = decodeURIComponent(href.split("/").pop());
  document.getElementById("pdfModalEmbed").src = href;
  document.getElementById("pdfModalTab").href  = href;
  document.getElementById("pdfModalName").textContent = name;
  document.getElementById("pdfModal").classList.add("open");
});

/* ── Search ─────────────────────────────────────────────────────────── */
const searchInput = document.getElementById("searchInput");
const searchClear = document.getElementById("searchClear");

searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = searchInput.value.trim();
    loadNoteList();
  }, 250);
});

searchClear.addEventListener("click", () => {
  clearSearch();
});

function clearSearch() {
  searchInput.value = "";
  searchQ    = "";
  currentTag = null;
  searchAll  = false;
  // Restore active state on current folder; clear all tag pills
  document.querySelectorAll(".folder-item").forEach(e =>
    e.classList.toggle("active", e.dataset.folder === currentFolder)
  );
  document.querySelectorAll(".tag-pill").forEach(e =>
    e.classList.toggle("active", e.dataset.tag === "")  // "All Tags" pill
  );
  updateSearchAllPill();
  loadNoteList();
}

/* ── Keyboard shortcuts ─────────────────────────────────────────────── */
document.addEventListener("keydown", e => {
  // Escape: close PDF modal, then lightbox, then search
  if (e.key === "Escape") {
    const pdf = document.getElementById("pdfModal");
    if (pdf.classList.contains("open")) {
      pdf.classList.remove("open");
      document.getElementById("pdfModalEmbed").src = "";
      return;
    }
    const lb = document.getElementById("lightbox");
    if (lb.classList.contains("open")) {
      lb.classList.remove("open");
      return;
    }
    if (searchInput.value || currentTag) clearSearch();
    return;
  }

  // / or Cmd+F: focus search
  if ((e.key === "/" || (e.key === "f" && (e.metaKey || e.ctrlKey))) &&
      document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
    return;
  }

  // Arrow keys: navigate list
  if ((e.key === "ArrowDown" || e.key === "ArrowUp") && document.activeElement !== searchInput) {
    e.preventDefault();
    const idx = shownNotes.findIndex(n => n.file === selectedFile);
    const next = e.key === "ArrowDown"
      ? Math.min(shownNotes.length - 1, idx + 1)
      : Math.max(0, idx - 1);
    if (shownNotes[next]) openNote(shownNotes[next].file);
  }
});

/* ── Settings button ────────────────────────────────────────────────── */
document.getElementById("settingsBtn").addEventListener("click", () => {
  window.location.href = "/settings";
});

/* ── Sync ───────────────────────────────────────────────────────────── */
async function loadSyncStatus() {
  try {
    const r = await fetch("/api/sync");
    const d = await r.json();
    const el = document.getElementById("syncStatus");
    if (!d.last_synced) { el.textContent = "Not yet synced"; return; }
    const diff = Math.round((Date.now() - new Date(d.last_synced)) / 60000);
    el.textContent = diff < 1   ? "Synced just now"
      : diff < 60  ? `Synced ${diff}m ago`
      : `Synced ${Math.round(diff / 60)}h ago`;
  } catch { /* silent — sync not configured */ }
}

async function pollIndexProgress(btn, sta) {
  return new Promise(resolve => {
    function poll() {
      fetch("/api/index-status").then(r => r.json()).then(d => {
        if (d.active) {
          if (d.total > 0) btn.textContent = "↻ " + Math.round(d.done / d.total * 100) + "%";
          setTimeout(poll, 300);
        } else {
          sta.textContent = "Synced just now";
          btn.disabled = false;
          btn.textContent = "↻ Sync";
          loadFolders().then(loadTags).then(() => {
            updateSearchAllPill(); loadNoteList();
          }).then(resolve);
        }
      }).catch(() => setTimeout(poll, 500));
    }
    poll();
  });
}

document.getElementById("syncBtn").addEventListener("click", async () => {
  const btn = document.getElementById("syncBtn");
  const sta = document.getElementById("syncStatus");
  btn.disabled = true;
  btn.textContent = "↻ Syncing…";
  try {
    // Phase 1: sync.sh runs synchronously server-side (fast for incremental)
    const r = await fetch("/api/sync", { method: "POST" });
    const d = await r.json();
    if (d.status === "indexing") {
      // Phase 2: indexing is async — poll for progress
      btn.textContent = "↻ 0%";
      await pollIndexProgress(btn, sta);
    } else if (d.status === "ok") {
      sta.textContent = "Synced just now";
      await loadFolders(); await loadTags();
      updateSearchAllPill(); await loadNoteList();
      btn.disabled = false; btn.textContent = "↻ Sync";
    } else {
      alert("Sync failed: " + (d.message || "unknown error"));
      btn.disabled = false; btn.textContent = "↻ Sync";
    }
  } catch (e) {
    alert("Sync error: " + e.message);
    btn.disabled = false; btn.textContent = "↻ Sync";
  }
});

/* ── Startup index wait ─────────────────────────────────────────────── */
async function waitForStartupIndex() {
  return new Promise(resolve => {
    const overlay = document.getElementById("startupOverlay");
    const fill    = document.getElementById("startupFill");
    const label   = document.getElementById("startupLabel");
    overlay.classList.add("open");

    function poll() {
      fetch("/api/index-status").then(r => r.json()).then(d => {
        if (d.active) {
          const pct = d.total > 0 ? Math.round(d.done / d.total * 100) : 0;
          fill.style.width = pct + "%";
          label.textContent = d.total > 0
            ? `${d.done.toLocaleString()} of ${d.total.toLocaleString()} notes…`
            : "Starting…";
          setTimeout(poll, 300);
        } else {
          fill.style.width = "100%";
          label.textContent = `✓ ${d.count.toLocaleString()} notes ready`;
          setTimeout(() => { overlay.classList.remove("open"); resolve(); }, 500);
        }
      }).catch(() => setTimeout(poll, 500));
    }
    poll();
  });
}

/* ── Init ───────────────────────────────────────────────────────────── */
async function init() {
  // If the server is mid-index (async startup), show loading overlay first
  try {
    const st = await fetch("/api/index-status").then(r => r.json());
    if (st.active) await waitForStartupIndex();
  } catch { /* server not ready yet — proceed anyway */ }

  await loadFolders();
  await loadTags();
  updateSearchAllPill();
  await loadNoteList();
  loadSyncStatus();   // fire-and-forget
}

init();

/* ── Resizable panels ───────────────────────────────────────────────── */
(function () {
  function makeResizable(handleId, cssVar, minW, maxW, storageKey) {
    const handle = document.getElementById(handleId);
    const root   = document.documentElement;
    const saved  = parseInt(localStorage.getItem(storageKey), 10);
    if (saved >= minW && saved <= maxW) root.style.setProperty(cssVar, saved + "px");

    handle.addEventListener("mousedown", e => {
      e.preventDefault();
      const startX = e.clientX;
      const startW = parseInt(getComputedStyle(root).getPropertyValue(cssVar), 10);
      handle.classList.add("dragging");
      document.body.style.cursor     = "col-resize";
      document.body.style.userSelect = "none";

      function onMove(e) {
        const w = Math.min(maxW, Math.max(minW, startW + e.clientX - startX));
        root.style.setProperty(cssVar, w + "px");
      }
      function onUp() {
        handle.classList.remove("dragging");
        document.body.style.cursor     = "";
        document.body.style.userSelect = "";
        localStorage.setItem(storageKey, parseInt(getComputedStyle(root).getPropertyValue(cssVar), 10));
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup",   onUp);
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup",   onUp);
    });
  }

  makeResizable("sidebarResizeHandle", "--sidebar-w", 150, 400, "notes-sidebar-w");

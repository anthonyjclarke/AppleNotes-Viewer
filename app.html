<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes</title>
  <style>
    /* ── Variables ────────────────────────────────────────────────── */
    :root {
      --sidebar-w: 220px;
      --list-w:    310px;
      --radius:    10px;
      --trans:     0.15s ease;

      /* Light palette */
      --bg-app:       #F2EFE7;
      --bg-sidebar:   #EAE7DF;
      --bg-list:      #F7F5EE;
      --bg-content:   #FFFFFF;
      --bg-hover:     rgba(0,0,0,0.045);
      --bg-sel:       rgba(255,204,0,0.22);
      --bg-search:    rgba(0,0,0,0.07);
      --bg-group:     #F7F5EE;
      --bg-img:       #EDEBE3;

      --tx-primary:   #1C1C1E;
      --tx-secondary: #636366;
      --tx-tertiary:  #AEAEB2;
      --tx-group:     #8E8E93;

      --border:       rgba(0,0,0,0.09);
      --divider:      rgba(0,0,0,0.06);
      --accent:       #FFCC00;
      --mark-bg:      #FFED4A;
      --mark-tx:      #1C1C1E;

      --toggle-off:   #C7C7CC;
      --shadow:       0 1px 8px rgba(0,0,0,0.10);
    }

    [data-theme="dark"] {
      --bg-app:       #1C1C1E;
      --bg-sidebar:   #252527;
      --bg-list:      #2C2C2E;
      --bg-content:   #3A3A3C;
      --bg-hover:     rgba(255,255,255,0.055);
      --bg-sel:       rgba(255,204,0,0.13);
      --bg-search:    rgba(255,255,255,0.08);
      --bg-group:     #2C2C2E;
      --bg-img:       #48484A;

      --tx-primary:   #F2F2F7;
      --tx-secondary: #AEAEB2;
      --tx-tertiary:  #636366;
      --tx-group:     #636366;

      --border:       rgba(255,255,255,0.08);
      --divider:      rgba(255,255,255,0.05);
      --mark-bg:      #4A3A00;
      --mark-tx:      #FFD60A;

      --toggle-off:   #48484A;
      --shadow:       0 1px 8px rgba(0,0,0,0.4);
    }

    /* ── Reset ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
      background: var(--bg-app);
      color: var(--tx-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* ── App shell ────────────────────────────────────────────────── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 18px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--tx-primary);
    }

    /* Dark/light toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-emoji { font-size: 13px; }
    .toggle-track {
      width: 36px; height: 21px;
      background: var(--toggle-off);
      border-radius: 11px;
      position: relative;
      transition: background var(--trans);
    }
    .toggle-track.on { background: #34C759; }
    .toggle-thumb {
      position: absolute;
      width: 17px; height: 17px;
      background: #fff;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: transform var(--trans);
      box-shadow: 0 1px 4px rgba(0,0,0,0.30);
    }
    .toggle-track.on .toggle-thumb { transform: translateX(15px); }

    /* Folder list */
    .folder-list {
      flex: 1;
      overflow-y: auto;
      padding: 2px 0 12px;
    }

    .folder-section-label {
      padding: 10px 16px 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--tx-tertiary);
    }

    .folder-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px 7px 14px;
      border-radius: 8px;
      margin: 1px 6px;
      cursor: pointer;
      transition: background var(--trans);
    }
    .folder-item:hover { background: var(--bg-hover); }
    .folder-item.active { background: var(--bg-sel); }

    .folder-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .folder-name { font-size: 14px; font-weight: 500; flex: 1; min-width: 0;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .folder-badge {
      font-size: 12px; color: var(--tx-tertiary);
      background: var(--bg-hover); padding: 1px 6px;
      border-radius: 8px; flex-shrink: 0;
    }

    /* Tag items — reuse folder-item base, override icon */
    .tag-icon {
      font-size: 14px;
      font-weight: 800;
      color: var(--accent);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
      line-height: 1;
      font-family: -apple-system, BlinkMacSystemFont, monospace;
    }
    .folder-item.tag-item .folder-name {
      font-weight: 400;
    }

    /* Separator between folders and tags */
    .sidebar-divider {
      height: 1px;
      background: var(--divider);
      margin: 6px 14px;
    }

    /* ── Note List Panel ──────────────────────────────────────────── */
    .list-panel {
      width: var(--list-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-list);
      overflow: hidden;
    }

    /* ── Resize handle between list and content ───────────────────── */
    .resize-handle {
      width: 5px;
      flex-shrink: 0;
      cursor: col-resize;
      background: var(--border);
      position: relative;
      z-index: 10;
      transition: background 0.1s;
    }
    .resize-handle::after {
      content: "";
      position: absolute;
      inset: 0 -4px;  /* wider invisible hit-area */
    }
    .resize-handle:hover,
    .resize-handle.dragging { background: var(--accent); }

    .list-top {
      padding: 10px 11px 6px;
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }

    .search-wrap {
      position: relative;
    }
    .search-ico {
      position: absolute;
      left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--tx-tertiary);
      font-size: 13px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 7px 28px 7px 28px;
      border-radius: 9px;
      border: none;
      outline: none;
      background: var(--bg-search);
      color: var(--tx-primary);
      font-size: 14px;
      font-family: inherit;
      transition: background var(--trans);
    }
    .search-input::placeholder { color: var(--tx-tertiary); }
    .search-x {
      position: absolute;
      right: 7px; top: 50%;
      transform: translateY(-50%);
      width: 17px; height: 17px;
      background: var(--tx-tertiary);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--bg-list);
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
    }
    .search-input:not(:placeholder-shown) + .search-x { display: flex; }

    /* Search-all pill */
    .search-all-row {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 5px 2px 0;
    }
    .search-all-row.visible { display: flex; }
    .search-all-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px 3px 6px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--tx-tertiary);
      font-family: inherit;
      transition: all var(--trans);
      user-select: none;
      white-space: nowrap;
    }
    .search-all-pill:hover { border-color: var(--accent); color: var(--tx-secondary); }
    .search-all-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #1C1C1E;
    }
    .search-all-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
      flex-shrink: 0;
      transition: opacity var(--trans);
    }
    .search-all-pill.active .search-all-dot { opacity: 1; }

    .list-meta {
      padding: 5px 13px 2px;
      font-size: 11px;
      color: var(--tx-tertiary);
      font-weight: 500;
      flex-shrink: 0;
    }

    .note-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .note-list::-webkit-scrollbar { width: 5px; }
    .note-list::-webkit-scrollbar-track { background: transparent; }
    .note-list::-webkit-scrollbar-thumb { background: var(--tx-tertiary); border-radius: 3px; opacity: 0.4; }

    /* Group header */
    .group-hdr {
      padding: 14px 13px 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--tx-group);
      background: var(--bg-group);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    /* Note item */
    .note-item {
      padding: 9px 13px 9px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--divider);
      transition: background 0.1s;
      position: relative;
      user-select: none;
    }
    .note-item:hover { background: var(--bg-hover); }
    .note-item.active { background: var(--bg-sel); }
    .note-item.active::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .note-row1 {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 3px;
    }
    .note-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--tx-primary);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-date-badge {
      font-size: 11.5px;
      color: var(--tx-tertiary);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .note-snippet {
      font-size: 12.5px;
      color: var(--tx-secondary);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.45;
    }

    /* ── Content Panel ────────────────────────────────────────────── */
    .content-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-content);
      overflow: hidden;
    }

    .content-bar {
      text-align: center;
      padding: 14px 40px 12px;
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }
    .content-date-lbl {
      font-size: 12px;
      color: var(--tx-tertiary);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px 52px 60px;
    }
    .content-scroll::-webkit-scrollbar { width: 7px; }
    .content-scroll::-webkit-scrollbar-track { background: transparent; }
    .content-scroll::-webkit-scrollbar-thumb { background: var(--tx-tertiary); border-radius: 4px; }

    /* Note body typography */
    .note-body {
      max-width: 740px;
      margin: 0 auto;
      font-size: 15px;
      line-height: 1.68;
      color: var(--tx-primary);
      word-break: break-word;
    }
    .note-body h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--tx-primary);
      margin-bottom: 2px;
      line-height: 1.25;
    }
    .note-body br { display: block; }
    .note-body img {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      margin: 10px 0;
      background: var(--bg-img);
      cursor: zoom-in;
      transition: opacity 0.1s, transform 0.1s;
    }
    .note-body img:hover { opacity: 0.93; transform: scale(0.995); }
    .note-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
      font-size: 14px;
      border-radius: 8px;
      overflow: hidden;
    }
    .note-body td, .note-body th {
      border: 1px solid var(--border);
      padding: 8px 13px;
      color: var(--tx-primary);
      text-align: left;
    }
    .note-body th { background: var(--bg-search); font-weight: 600; }
    .note-body tr:nth-child(even) td { background: rgba(0,0,0,0.025); }
    [data-theme="dark"] .note-body tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
    .note-body ul, .note-body ol { padding-left: 22px; margin: 6px 0; }
    .note-body li { margin: 3px 0; }
    .note-body a { color: var(--accent); text-decoration: none; }
    .note-body a:hover { text-decoration: underline; }
    .note-body embed, .note-body object {
      display: block;
      width: 100%;
      height: 600px;
      border: none;
      border-radius: var(--radius);
      margin: 8px 0;
    }

    /* ── Placeholder / empty states ───────────────────────────────── */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--tx-tertiary);
      text-align: center;
      padding: 40px;
    }
    .placeholder-icon { font-size: 56px; opacity: 0.3; }
    .placeholder-title { font-size: 17px; font-weight: 600; color: var(--tx-secondary); }
    .placeholder-sub   { font-size: 14px; }

    /* ── Loading ──────────────────────────────────────────────────── */
    .loading-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; height: 100%;
      font-size: 14px; color: var(--tx-tertiary);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    /* ── Search highlight ─────────────────────────────────────────── */
    mark {
      background: var(--mark-bg);
      color: var(--mark-tx);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── Lightbox ─────────────────────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 12px 60px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <span class="sidebar-title">Notes</span>
      <div class="toggle-wrap" id="themeToggleWrap" title="Toggle dark mode">
        <span class="toggle-emoji" id="themeEmoji">☀️</span>
        <div class="toggle-track" id="themeTrack">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </div>

    <div class="folder-list" id="folderList">
      <!-- Populated by JS -->
    </div>
  </aside>

  <!-- ── Note List ───────────────────────────────────────────────── -->
  <div class="list-panel">
    <div class="list-top">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input id="searchInput" class="search-input" type="search" placeholder="Search" autocomplete="off" spellcheck="false">
        <div class="search-x" id="searchClear">✕</div>
      </div>
      <div class="search-all-row" id="searchAllRow">
        <button class="search-all-pill" id="searchAllPill" title="Search across all folders">
          <span class="search-all-dot"></span>Search all notes
        </button>
      </div>
    </div>
    <div class="list-meta" id="listMeta"></div>
    <div class="note-list" id="noteList">
      <div class="loading-wrap"><div class="spinner"></div>Loading…</div>
    </div>
  </div>

  <!-- ── Resize handle ─────────────────────────────────────────── -->
  <div class="resize-handle" id="listResizeHandle"></div>

  <!-- ── Content ─────────────────────────────────────────────────── -->
  <div class="content-panel" id="contentPanel">
    <div class="placeholder">
      <div class="placeholder-icon">📝</div>
      <div class="placeholder-title">Select a note</div>
      <div class="placeholder-sub">Choose from the list to read it here</div>
    </div>
  </div>

</div><!-- .app -->

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
/* ── State ─────────────────────────────────────────────────────────── */
let allNotes      = [];
let shownNotes    = [];
let selectedFile  = null;
let currentFolder = "__all__";
let searchTimer   = null;
let searchQ       = "";
let searchAll     = false;
let currentTag    = null;   // active tag filter, e.g. "#GPS"

/* ── Theme ──────────────────────────────────────────────────────────── */
const html      = document.documentElement;
const themeTrack = document.getElementById("themeTrack");
const themeEmoji = document.getElementById("themeEmoji");

function setTheme(dark) {
  html.setAttribute("data-theme", dark ? "dark" : "light");
  themeTrack.classList.toggle("on", dark);
  themeEmoji.textContent = dark ? "🌙" : "☀️";
  localStorage.setItem("notes-theme", dark ? "dark" : "light");
}

function isDark() { return html.getAttribute("data-theme") === "dark"; }

// Init theme
(function initTheme() {
  const saved = localStorage.getItem("notes-theme");
  if (saved) { setTheme(saved === "dark"); }
  else { setTheme(window.matchMedia("(prefers-color-scheme: dark)").matches); }
})();

document.getElementById("themeToggleWrap").addEventListener("click", () => setTheme(!isDark()));

/* ── Date utilities ─────────────────────────────────────────────────── */
function localDate(dateStr) {
  // Parse YYYY-MM-DD as local date (avoid UTC-offset issues)
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function fmtShort(dateStr) {
  if (!dateStr || dateStr === "1900-01-01") return "";
  const d   = localDate(dateStr);
  const now  = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff  = Math.floor((today - d) / 86400000);
  if (diff === 0) return "Today";
  if (diff === 1) return "Yesterday";
  if (diff < 7)   return d.toLocaleDateString("en-AU", { weekday: "short" });
  if (d.getFullYear() === now.getFullYear())
    return d.toLocaleDateString("en-AU", { day: "numeric", month: "short" });
  return d.toLocaleDateString("en-AU", { day: "numeric", month: "short", year: "numeric" });
}

function fmtFull(dateStr) {
  if (!dateStr || dateStr === "1900-01-01") return "";
  return localDate(dateStr).toLocaleDateString("en-AU", {
    weekday: "long", day: "numeric", month: "long", year: "numeric"
  });
}

function groupLabel(dateStr) {
  if (!dateStr || dateStr === "1900-01-01") return "Undated";
  const d    = localDate(dateStr);
  const now  = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff  = Math.floor((today - d) / 86400000);
  if (diff === 0)  return "Today";
  if (diff === 1)  return "Yesterday";
  if (diff <= 7)   return "Previous 7 Days";
  if (diff <= 30)  return "Previous 30 Days";
  return String(d.getFullYear());
}

/* ── HTML escaping + highlight ──────────────────────────────────────── */
function esc(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function highlight(text, q) {
  if (!q || !text) return esc(text);
  const qEsc = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const parts = text.split(new RegExp(`(${qEsc})`, "gi"));
  return parts.map((p, i) => i % 2 ? `<mark>${esc(p)}</mark>` : esc(p)).join("");
}

/* ── Render folders ─────────────────────────────────────────────────── */
async function loadFolders() {
  const resp = await fetch("/api/folders");
  const data = await resp.json();   // {total, groups:[{label, folders:[{name,path,count,deleted}]}]}

  let html = `<div class="folder-item ${currentFolder === "__all__" && !currentTag ? "active" : ""}" data-folder="__all__">
    <span class="folder-icon">📋</span>
    <span class="folder-name">All Notes</span>
    <span class="folder-badge">${data.total}</span>
  </div>`;

  for (const group of data.groups) {
    html += `<div class="folder-section-label">${esc(group.label)}</div>`;
    for (const f of group.folders) {
      const icon   = f.deleted ? '🗑️' : '📁';
      const active = currentFolder === f.path && !currentTag ? " active" : "";
      html += `<div class="folder-item${active}" data-folder="${esc(f.path)}">
        <span class="folder-icon">${icon}</span>
        <span class="folder-name">${esc(f.name)}</span>
        <span class="folder-badge">${f.count}</span>
      </div>`;
    }
  }

  document.getElementById("folderList").innerHTML = html;

  document.querySelectorAll(".folder-item:not(.tag-item)").forEach(el => {
    el.addEventListener("click", () => {
      currentFolder = el.dataset.folder;
      currentTag    = null;
      searchQ       = "";
      searchAll     = false;
      document.getElementById("searchInput").value = "";
      document.querySelectorAll(".folder-item").forEach(e => e.classList.remove("active"));
      el.classList.add("active");
      updateSearchAllPill();
      loadNoteList();
    });
  });
}

/* ── Tags sidebar ────────────────────────────────────────────────────── */
async function loadTags() {
  const resp = await fetch("/api/tags");
  const tags = await resp.json();
  if (!tags.length) return;

  const container = document.getElementById("folderList");

  let html = `<div class="sidebar-divider"></div>
    <div class="folder-section-label">Tags</div>`;

  for (const { tag, count } of tags) {
    const name   = tag.slice(1);                          // strip leading #
    const active = currentTag === tag ? " active" : "";
    html += `<div class="folder-item tag-item${active}" data-tag="${esc(tag)}">
      <span class="tag-icon">#</span>
      <span class="folder-name">${esc(name)}</span>
      <span class="folder-badge">${count}</span>
    </div>`;
  }

  container.insertAdjacentHTML("beforeend", html);

  container.querySelectorAll(".tag-item").forEach(el => {
    el.addEventListener("click", () => {
      currentTag = el.dataset.tag;
      searchQ    = currentTag;
      searchAll  = false;           // tag search always uses __all__ internally
      document.getElementById("searchInput").value = currentTag;
      document.querySelectorAll(".folder-item").forEach(e => e.classList.remove("active"));
      el.classList.add("active");
      updateSearchAllPill();
      loadNoteList();
    });
  });
}

/* ── Search-all pill ────────────────────────────────────────────────── */
function updateSearchAllPill() {
  const row  = document.getElementById("searchAllRow");
  const pill = document.getElementById("searchAllPill");
  // Hide the pill entirely when in tag mode (tag search is always global)
  // Show only when a specific folder is selected and no tag is active
  const folderScoped = currentFolder !== "__all__" && !currentTag;
  row.classList.toggle("visible", folderScoped);
  pill.classList.toggle("active", searchAll);
}

document.getElementById("searchAllPill").addEventListener("click", () => {
  searchAll = !searchAll;
  updateSearchAllPill();
  loadNoteList();
});

/* ── Load & render note list ────────────────────────────────────────── */
async function loadNoteList() {
  document.getElementById("noteList").innerHTML =
    `<div class="loading-wrap"><div class="spinner"></div>Loading…</div>`;

  // Tag mode: always search all folders
  // searchAll toggle: expand a folder search to all folders
  const folder = (currentTag || searchAll) && searchQ.length >= 2
    ? "__all__"
    : currentFolder;

  const url = searchQ.length >= 2
    ? `/api/search?q=${encodeURIComponent(searchQ)}&folder=${encodeURIComponent(folder)}`
    : `/api/notes?folder=${encodeURIComponent(currentFolder)}`;

  const resp = await fetch(url);
  allNotes   = await resp.json();
  shownNotes = allNotes;
  renderList();
}

function renderList() {
  const listEl = document.getElementById("noteList");
  const metaEl = document.getElementById("listMeta");
  const q      = searchQ.length >= 2 ? searchQ : "";

  if (shownNotes.length === 0) {
    listEl.innerHTML = `
      <div class="placeholder" style="height:auto;padding:60px 20px;">
        <div class="placeholder-icon">🔍</div>
        <div class="placeholder-title">No Results</div>
        <div class="placeholder-sub">Nothing matched "${esc(q)}"</div>
      </div>`;
    metaEl.textContent = "No results";
    return;
  }

  metaEl.textContent = q
    ? `${shownNotes.length} result${shownNotes.length !== 1 ? "s" : ""}`
    : `${shownNotes.length} note${shownNotes.length !== 1 ? "s" : ""}`;

  let out = "";
  let lastGroup = null;

  for (const note of shownNotes) {
    const grp = groupLabel(note.date);
    if (grp !== lastGroup) {
      out += `<div class="group-hdr">${esc(grp)}</div>`;
      lastGroup = grp;
    }
    const active = note.file === selectedFile ? " active" : "";
    out += `
      <div class="note-item${active}" data-file="${esc(note.file)}">
        <div class="note-row1">
          <div class="note-title">${highlight(note.title, q)}</div>
          <div class="note-date-badge">${esc(fmtShort(note.date))}</div>
        </div>
        <div class="note-snippet">${highlight(note.snippet, q)}</div>
      </div>`;
  }

  listEl.innerHTML = out;
  listEl.querySelectorAll(".note-item").forEach(el =>
    el.addEventListener("click", () => openNote(el.dataset.file))
  );

  // Scroll selected item into view
  const active = listEl.querySelector(".note-item.active");
  if (active) active.scrollIntoView({ block: "nearest" });
}

/* ── Open & render a note ───────────────────────────────────────────── */
async function openNote(file) {
  if (selectedFile === file) return;
  selectedFile = file;

  // Highlight in list
  document.querySelectorAll(".note-item").forEach(el =>
    el.classList.toggle("active", el.dataset.file === file)
  );

  const panel = document.getElementById("contentPanel");
  panel.innerHTML = `<div class="loading-wrap"><div class="spinner"></div>Loading…</div>`;

  try {
    const resp = await fetch(`/api/note?file=${encodeURIComponent(file)}`);
    const rawHtml = await resp.text();
    renderNote(rawHtml, file);
  } catch {
    panel.innerHTML = `
      <div class="placeholder">
        <div class="placeholder-icon">⚠️</div>
        <div class="placeholder-title">Could not load note</div>
      </div>`;
  }
}

function renderNote(rawHtml, file) {
  const doc  = new DOMParser().parseFromString(rawHtml, "text/html");
  const body = doc.body;

  // Determine folder path for static URL rewriting
  const note = allNotes.find(n => n.file === file) || shownNotes.find(n => n.file === file) || {};

  // Rewrite image src: images/UUID.png → /static/{folder}/images/UUID.png
  // Per-segment encoding preserves "/" separators in multi-level folder paths
  const folderPath = (note.folder || "").split("/").map(encodeURIComponent).join("/");
  body.querySelectorAll("img[src]").forEach(img => {
    const src = img.getAttribute("src") || "";
    if (src.startsWith("images/")) {
      img.setAttribute("src", `/static/${folderPath}/${src}`);
    }
    img.removeAttribute("style"); // let our CSS control sizing
  });

  // Rewrite attachment hrefs (<a> links)
  body.querySelectorAll("a[href]").forEach(a => {
    const href = a.getAttribute("href") || "";
    if (href.startsWith("attachments/")) {
      a.setAttribute("href", `/static/${folderPath}/${href}`);
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    }
  });

  // Rewrite embedded attachments — Falcon uses <embed src> and sometimes <object data>
  // for inline PDFs; neither is caught by the <a href> rewriter above
  body.querySelectorAll("embed[src], object[data]").forEach(el => {
    const attr = el.tagName === "OBJECT" ? "data" : "src";
    const val  = el.getAttribute(attr) || "";
    if (val.startsWith("attachments/")) {
      el.setAttribute(attr, `/static/${folderPath}/${val}`);
    }
  });

  const fullDate = fmtFull(note.date || "");
  const panel    = document.getElementById("contentPanel");

  panel.innerHTML = `
    <div class="content-bar">
      <div class="content-date-lbl">${esc(fullDate)}</div>
    </div>
    <div class="content-scroll">
      <div class="note-body" id="noteBody"></div>
    </div>`;

  document.getElementById("noteBody").innerHTML = body.innerHTML;

  // Lightbox for images
  document.querySelectorAll(".note-body img").forEach(img => {
    img.addEventListener("click", () => {
      document.getElementById("lightboxImg").src = img.src;
      document.getElementById("lightbox").classList.add("open");
    });
  });
}

/* ── Lightbox ───────────────────────────────────────────────────────── */
document.getElementById("lightbox").addEventListener("click", () =>
  document.getElementById("lightbox").classList.remove("open")
);

/* ── Search ─────────────────────────────────────────────────────────── */
const searchInput = document.getElementById("searchInput");
const searchClear = document.getElementById("searchClear");

searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = searchInput.value.trim();
    loadNoteList();
  }, 250);
});

searchClear.addEventListener("click", () => {
  clearSearch();
});

function clearSearch() {
  searchInput.value = "";
  searchQ    = "";
  currentTag = null;
  searchAll  = false;
  // Restore active state on current folder
  document.querySelectorAll(".folder-item").forEach(e =>
    e.classList.toggle("active", !e.classList.contains("tag-item") && e.dataset.folder === currentFolder)
  );
  updateSearchAllPill();
  loadNoteList();
}

/* ── Keyboard shortcuts ─────────────────────────────────────────────── */
document.addEventListener("keydown", e => {
  // Escape: close lightbox or clear search/tag
  if (e.key === "Escape") {
    const lb = document.getElementById("lightbox");
    if (lb.classList.contains("open")) {
      lb.classList.remove("open");
    } else if (searchInput.value || currentTag) {
      clearSearch();
    }
    return;
  }

  // / or Cmd+F: focus search
  if ((e.key === "/" || (e.key === "f" && (e.metaKey || e.ctrlKey))) &&
      document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
    return;
  }

  // Arrow keys: navigate list
  if ((e.key === "ArrowDown" || e.key === "ArrowUp") && document.activeElement !== searchInput) {
    e.preventDefault();
    const idx = shownNotes.findIndex(n => n.file === selectedFile);
    const next = e.key === "ArrowDown"
      ? Math.min(shownNotes.length - 1, idx + 1)
      : Math.max(0, idx - 1);
    if (shownNotes[next]) openNote(shownNotes[next].file);
  }
});

/* ── Init ───────────────────────────────────────────────────────────── */
async function init() {
  await loadFolders();
  await loadTags();
  updateSearchAllPill();
  await loadNoteList();
}

init();

/* ── Resizable list panel ───────────────────────────────────────────── */
(function () {
  const handle = document.getElementById("listResizeHandle");
  const root   = document.documentElement;
  const MIN_W  = 180;
  const MAX_W  = 700;
  const KEY    = "notes-list-w";

  const saved = parseInt(localStorage.getItem(KEY), 10);
  if (saved >= MIN_W && saved <= MAX_W) {
    root.style.setProperty("--list-w", saved + "px");
  }

  handle.addEventListener("mousedown", e => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = parseInt(getComputedStyle(root).getPropertyValue("--list-w"), 10);
    handle.classList.add("dragging");
    document.body.style.cursor    = "col-resize";
    document.body.style.userSelect = "none";

    function onMove(e) {
      const w = Math.min(MAX_W, Math.max(MIN_W, startW + e.clientX - startX));
      root.style.setProperty("--list-w", w + "px");
    }

    function onUp() {
      handle.classList.remove("dragging");
      document.body.style.cursor    = "";
      document.body.style.userSelect = "";
      localStorage.setItem(KEY, parseInt(getComputedStyle(root).getPropertyValue("--list-w"), 10));
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup",   onUp);
    }

    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup",   onUp);
  });
})();
</script>
